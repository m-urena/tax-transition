services:
  - type: web
    name: bison-tax-optimizer
    runtime: python
    buildCommand: apt-get install -y libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /_stcore/health
